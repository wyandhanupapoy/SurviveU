                    const date = overlay.querySelector('#expDate').value;
                    const category = overlay.querySelector('#expCategory').value;
                    const amount = parseInt(overlay.querySelector('#expAmount').value) || 0;
                    const method = overlay.querySelector('#expMethod').value;
                    const note = overlay.querySelector('#expNote').value;
                    if (!date || amount <= 0) {
                        this.ui.showToast('Tanggal dan nominal wajib diisi!', 'danger');
                        return false;
                    }
                    if (existing) {
                        fm.updateExpense(existing.id, { date, category, amount, method, note });
                        this.ui.showToast('Pengeluaran diperbarui ✅', 'success');
                    } else {
                        fm.addExpense({ date, category, amount, method, note });
                        this.ui.showToast('Pengeluaran ditambahkan 💸', 'info');
                    }
                    this.renderPage('expenses');
                }, existing ? 'Update' : 'Simpan');
            }

            async deleteExpense(id) {
                if (confirm('Hapus pengeluaran ini?')) {
                    await this.finance.deleteExpense(id);
                    this.ui.showToast('Pengeluaran dihapus 🗑', 'info');
                    this.renderPage('expenses');
                }
            }

            // ==================== DEBTS PAGE ====================
            renderDebts() {
                const fm = this.finance;
                const debts = fm.debts;
                let rows = '';
                if (debts.length === 0) {
                    rows =
                        `<tr><td colspan="7"><div class="empty-state"><i data-lucide="credit-card"></i><p>Belum ada hutang tercatat</p></div></td></tr>`;
                } else {
                    // Sort by priority
                    const priorityOrder = { high: 0, medium: 1, low: 2 };
                    const sorted = [...debts].sort((a, b) => (priorityOrder[a.priority] || 3) - (priorityOrder[b
                        .priority] || 3));
                    sorted.forEach(d => {
                        const remaining = d.amount - (d.paid || 0);
                        const isPaid = d.status === 'paid';
                        const rowClass = isPaid ? 'text-muted' : '';
                        const priorityBadge = d.priority === 'high' ?
                            '<span style="color:#ff5252;font-weight:700;">🔴 Tinggi</span>' :
                            d.priority === 'medium' ?
                                '<span style="color:#f9a825;font-weight:600;">🟡 Sedang</span>' :
                                '<span style="color:#448aff;">🔵 Rendah</span>';
                        rows += `
                            <tr class="${rowClass}">
                                <td><b>${d.name}</b></td>
                                <td>${this.ui.formatRupiah(d.amount)}</td>
                                <td>${this.ui.formatRupiah(d.paid || 0)}</td>
                                <td style="color:${isPaid ? 'var(--success)' : 'var(--danger)'}"><b>${this.ui.formatRupiah(remaining)}</b></td>
                                <td>${this.ui.formatDate(d.dueDate)}</td>
                                <td>${priorityBadge}</td>
                                <td>
                                    ${isPaid ? '<span class="text-success">✅ Lunas</span>' : `
                                        <button class="btn-success-sm debt-pay-btn" data-id="${d.id}" style="margin-right:4px;">✅ Lunas</button>
                                        <button class="btn-danger-sm debt-delete-btn" data-id="${d.id}">🗑</button>
                                    `}
                                </td>
                            </tr>
                        `;
                    });
                }
                return `
                    <div class="page-header">
                        <h1>💳 Manajemen Hutang</h1>
                        <p class="subtitle">Total: ${this.ui.formatRupiah(fm.getTotalDebtRemaining())} tersisa • ${this.ui.formatRupiah(fm.getTotalDebtPaid())} terbayar</p>
                        <button class="btn btn-primary btn-sm" id="btnAddDebt" style="margin-top:8px;">+ Tambah Hutang</button>
                    </div>
                    <div class="table-wrap glass-sm">
                        <table>
                            <thead><tr><th>Nama</th><th>Total</th><th>Terbayar</th><th>Sisa</th><th>Jatuh Tempo</th><th>Prioritas</th><th>Aksi</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            }

            showDebtModal() {
                const contentHtml = `
                    <div style="display:flex;flex-direction:column;gap:10px;">
                        <div><label style="font-size:0.75rem;color:var(--text-muted);">Nama Hutang</label>
                            <input type="text" id="debtName" placeholder="Contoh: Cicilan Laptop"></div>
                        <div><label style="font-size:0.75rem;color:var(--text-muted);">Total (Rp)</label>
                            <input type="number" id="debtAmount" placeholder="0" min="1"></div>
                        <div><label style="font-size:0.75rem;color:var(--text-muted);">Sudah Dibayar (Rp)</label>
                            <input type="number" id="debtPaid" value="0" min="0"></div>
                        <div><label style="font-size:0.75rem;color:var(--text-muted);">Jatuh Tempo</label>
                            <input type="date" id="debtDueDate"></div>
                        <div><label style="font-size:0.75rem;color:var(--text-muted);">Prioritas</label>
                            <select id="debtPriority"><option value="high">🔴 Tinggi</option><option value="medium">🟡 Sedang</option><option value="low">🔵 Rendah</option></select></div>
                    </div>
                `;
                this.ui.showModal('Tambah Hutang', contentHtml, async (overlay) => {
                    const name = overlay.querySelector('#debtName').value.trim();
                    const amount = parseInt(overlay.querySelector('#debtAmount').value) || 0;
                    const paid = parseInt(overlay.querySelector('#debtPaid').value) || 0;
                    const dueDate = overlay.querySelector('#debtDueDate').value;
                    const priority = overlay.querySelector('#debtPriority').value;
                    if (!name || amount <= 0) {
                        this.ui.showToast('Nama dan total wajib diisi!', 'danger');
                        return false;
                    }
                    await this.finance.addDebt({
                        name, amount, paid, dueDate, priority, status: paid >= amount ?
                            'paid' : 'unpaid'
                    });
                    this.ui.showToast('Hutang ditambahkan 📋', 'info');
                    this.renderPage('debts');
                });
            }

            async markDebtPaid(id) {
                if (confirm('Tandai hutang ini sebagai lunas?')) {
                    await this.finance.markDebtPaid(id);
                    this.ui.showToast('Hutang dilunasi! 🎉', 'success');
                    this.renderPage('debts');
                }
            }

            async deleteDebt(id) {
                if (confirm('Hapus hutang ini?')) {
                    await this.finance.deleteDebt(id);
                    this.ui.showToast('Hutang dihapus 🗑', 'info');
                    this.renderPage('debts');
                }
            }

            // ==================== ANALYTICS PAGE ====================
            renderAnalytics() {
                const fm = this.finance;
                const healthScore = this.analytics.getFinancialHealthScore();
                const dangerous = this.analytics.getMostDangerousCategory();
                const weeklySummary = fm.getWeeklySummary();
                const totalExp = fm.getTotalExpenses();
                const burnRate = fm.getDaysElapsed() > 0 ? Math.round(fm.getTotalExpenses() / fm.getDaysElapsed()) : 0;

                let weeklyHtml = '';
                for (const [week, amount] of Object.entries(weeklySummary)) {
                    const pct = totalExp > 0 ? Math.round((amount / totalExp) * 100) : 0;
                    weeklyHtml += `
                        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
                            <span>${week}</span>
                            <span><b>${this.ui.formatRupiah(amount)}</b> (${pct}%)</span>
                        </div>
                    `;
                }

                return `
                    <div class="page-header">
                        <h1>📈 Analitik & Insight</h1>
                        <p class="subtitle">Financial Health Score: <b>${healthScore}/100</b></p>
                    </div>
                    <div class="cards-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));">
                        <div class="stat-card"><div class="card-label">Total Pengeluaran</div><div class="card-value" style="font-size:1.1rem;">${this.ui.formatRupiah(totalExp)}</div></div>
                        <div class="stat-card"><div class="card-label">Burn Rate/Hari</div><div class="card-value" style="font-size:1.1rem;">${this.ui.formatRupiah(burnRate)}</div></div>
                        <div class="stat-card"><div class="card-label">Kategori Berbahaya</div><div class="card-value" style="font-size:1rem;">${dangerous.category || '-'}</div><div class="card-sub">${dangerous.amount ? this.ui.formatRupiah(dangerous.amount) : ''}</div></div>
                        <div class="stat-card"><div class="card-label">Hari Berlalu</div><div class="card-value" style="font-size:1.1rem;">${fm.getDaysElapsed()}/${fm.totalDays}</div></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;">
                        <div class="glass-sm" style="padding:16px;">
                            <h4 style="font-size:0.8rem;margin-bottom:8px;color:var(--text-secondary);">📊 Pengeluaran Harian</h4>
                            <div class="chart-container" style="height:240px;"><canvas id="dailyChart"></canvas></div>
                        </div>
                        <div class="glass-sm" style="padding:16px;">
                            <h4 style="font-size:0.8rem;margin-bottom:8px;color:var(--text-secondary);">🍩 Kategori Pengeluaran</h4>
                            <div class="chart-container" style="height:240px;"><canvas id="categoryChart"></canvas></div>
                        </div>
                    </div>
                    <div class="glass-sm" style="padding:16px;margin-top:12px;">
                        <h4 style="font-size:0.8rem;margin-bottom:8px;color:var(--text-secondary);">📅 Ringkasan Mingguan</h4>
                        ${weeklyHtml || '<p class="text-muted" style="font-size:0.8rem;">Belum ada data</p>'}
                    </div>
                `;
            }

            // ==================== SETTINGS PAGE ====================
            renderSettings() {
                const fm = this.finance;
                return `
                    <div class="page-header">
                        <h1>⚙️ Pengaturan</h1>
                    </div>
                    <div class="glass-sm" style="padding:20px;margin-bottom:14px;">
                        <h4 style="margin-bottom:12px;">📝 Data Bulanan</h4>
                        <div style="display:flex;flex-direction:column;gap:10px;">
                            <div><label style="font-size:0.75rem;color:var(--text-muted);">Uang Awal Bulan (Rp)</label>
                                <input type="number" id="setInitialMoney" value="${fm.initialMoney}"></div>
                            <div><label style="font-size:0.75rem;color:var(--text-muted);">Tanggal Mulai</label>
                                <input type="date" id="setMonthStart" value="${fm.monthStart}"></div>
                            <div><label style="font-size:0.75rem;color:var(--text-muted);">Tanggal Akhir</label>
                                <input type="date" id="setMonthEnd" value="${fm.monthEnd}"></div>
                            <button class="btn btn-primary btn-sm" id="btnSaveSettings">💾 Simpan Pengaturan</button>
                        </div>
                    </div>
                    <div class="glass-sm" style="padding:20px;margin-bottom:14px;">
                        <h4 style="margin-bottom:12px;">🔄 Reset Bulan Baru</h4>
                        <p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:8px;">Ini akan mereset semua pengeluaran dan mengembalikan saldo ke uang awal (hutang di-reset ke default).</p>
                        <button class="btn btn-outline btn-sm" id="btnResetMonth">🔄 Reset Bulan Baru</button>
                    </div>
                    <div class="glass-sm" style="padding:20px;margin-bottom:14px;">
                        <h4 style="margin-bottom:12px;">💾 Data</h4>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-outline btn-sm" id="btnExportData">📤 Export Data (JSON)</button>
                            <button class="btn btn-outline btn-sm" id="btnImportData">📥 Import Data (JSON)</button>
                            <button class="btn btn-danger-sm" id="btnResetData" style="margin-left:auto;">⚠️ Reset Semua Data</button>
                        </div>
                    </div>
                `;
            }

            async saveSettings() {
                const initialMoney = parseInt(document.getElementById('setInitialMoney').value) || 1000000;
                const monthStart = document.getElementById('setMonthStart').value;
                const monthEnd = document.getElementById('setMonthEnd').value;
                this.finance.initialMoney = initialMoney;
                this.finance.monthStart = monthStart;
                this.finance.monthEnd = monthEnd;
                this.finance.totalDays = this.finance.getDaysInMonth();
                await this.finance.storage.setData('initialMoney', initialMoney);
                await this.finance.storage.setData('monthStart', monthStart);
                await this.finance.storage.setData('monthEnd', monthEnd);
                await this.finance.recalculateBalance();
                this.ui.showToast('Pengaturan disimpan ✅', 'success');
                this.renderPage('settings');
            }

            async exportData() {
                const data = await this.storage.exportAll();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'surviveu_backup_' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
                this.ui.showToast('Data diexport! 📤', 'success');
            }

            showImportModal() {
                const contentHtml = `
                    <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:10px;">Pilih file JSON hasil export sebelumnya.</p>
                    <input type="file" id="importFileInput" accept=".json">
                `;
                this.ui.showModal('Import Data', contentHtml, async (overlay) => {
                    const fileInput = overlay.querySelector('#importFileInput');
                    const file = fileInput.files[0];
                    if (!file) {
                        this.ui.showToast('Pilih file terlebih dahulu', 'warning');
                        return false;
                    }
                    try {
                        const text = await file.text();
                        const data = JSON.parse(text);
                        await this.storage.importAll(data);
                        await this.finance.init();
                        this.analytics = new AnalyticsManager(this.finance);
                        this.ui.showToast('Data berhasil diimport! 📥', 'success');
                        this.renderPage('settings');
                    } catch (e) {
                        this.ui.showToast('Gagal import: file tidak valid', 'danger');
                    }
                }, 'Import');
            }

            async resetAllData() {
                if (confirm('⚠️ Yakin ingin mereset SEMUA data? Ini tidak bisa dibatalkan!')) {
                    if (confirm('Terakhir: semua data akan hilang. Lanjutkan?')) {
                        await this.storage.clearAll();
                        await this.finance.init();
                        this.analytics = new AnalyticsManager(this.finance);
                        this.ui.showToast('Semua data direset 🔄', 'warning');
                        this.ui.navigateTo('dashboard');
                        this.renderPage('dashboard');
                    }
                }
            }

            async resetMonth() {
                if (confirm('Reset ke bulan baru? Pengeluaran akan dihapus, saldo kembali ke awal.')) {
                    await this.finance.resetMonth(this.finance.initialMoney);
                    this.analytics = new AnalyticsManager(this.finance);
                    this.ui.showToast('Bulan baru dimulai! 🎉', 'success');
                    this.ui.navigateTo('dashboard');
                    this.renderPage('dashboard');
                }
            }
        }

        // ==================== INITIALIZE APP ====================
        const app = new App();
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

        // Global error handler
        window.addEventListener('error', (e) => {
            console.error('App error:', e.error);
            const toastContainer = document.getElementById('toastContainer');
            if (toastContainer) {
                const toast = document.createElement('div');
                toast.className = 'toast toast-danger';
                toast.textContent = '⚠️ Terjadi kesalahan. Silakan refresh halaman.';
                toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }
        });

        console.log('🚀 SurviveU - Manajemen Keuangan Mahasiswa');
        console.log('📅 Hari ini: 04 Mei 2026');
        console.log('💰 Uang awal: Rp1.000.000');
        console.log('💳 Total hutang default: Rp473.725');
        console.log('📱 Siap digunakan!');
    </script>
</body>

</html>
