                    const pct = totalExp > 0 ? Math.round((amount / totalExp) * 100) : 0;
                    weeklyHtml += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);"><span>${week}</span><span><b>${this.ui.formatRupiah(amount)}</b> (${pct}%)</span></div>`;
                }
                return `
                    <div class="page-header"><h1>📈 Analitik & Insight</h1><p class="subtitle">Skor Kesehatan: <b>${healthScore}/100</b></p></div>
                    <div class="cards-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));">
                        <div class="stat-card"><div class="card-label">Total Pengeluaran</div><div class="card-value" style="font-size:1.1rem;">${this.ui.formatRupiah(totalExp)}</div></div>
                        <div class="stat-card"><div class="card-label">Burn Rate/Hari</div><div class="card-value" style="font-size:1.1rem;">${this.ui.formatRupiah(burnRate)}</div></div>
                        <div class="stat-card"><div class="card-label">Kategori Berbahaya</div><div class="card-value" style="font-size:1rem;">${dangerous.category || '-'}</div><div class="card-sub">${dangerous.amount ? this.ui.formatRupiah(dangerous.amount) : ''}</div></div>
                        <div class="stat-card"><div class="card-label">Hari Berlalu</div><div class="card-value" style="font-size:1.1rem;">${fm.getDaysElapsed()}/${fm.totalDays}</div></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;">
                        <div class="glass-sm" style="padding:16px;"><h4 style="font-size:0.8rem;">📊 Pengeluaran Harian</h4><div class="chart-container" style="height:240px;"><canvas id="dailyChart"></canvas></div></div>
                        <div class="glass-sm" style="padding:16px;"><h4 style="font-size:0.8rem;">🍩 Kategori</h4><div class="chart-container" style="height:240px;"><canvas id="categoryChart"></canvas></div></div>
                    </div>
                    <div class="glass-sm" style="padding:16px;margin-top:12px;"><h4 style="font-size:0.8rem;">📅 Ringkasan Mingguan</h4>${weeklyHtml || '<p class="text-muted">Belum ada data</p>'}</div>
                `;
            }
            renderSettings() {
                const fm = this.finance;
                return `
                    <div class="page-header"><h1>⚙️ Pengaturan</h1></div>
                    <div class="glass-sm" style="padding:20px;margin-bottom:14px;">
                        <h4>📝 Data Bulanan</h4>
                        <div style="display:flex;flex-direction:column;gap:10px;">
                            <div><label>Uang Awal (Rp)</label><input type="number" id="setInitialMoney" value="${fm.initialMoney}"></div>
                            <div><label>Tanggal Mulai</label><input type="date" id="setMonthStart" value="${fm.monthStart}"></div>
                            <div><label>Tanggal Akhir</label><input type="date" id="setMonthEnd" value="${fm.monthEnd}"></div>
                            <button class="btn btn-primary btn-sm" id="btnSaveSettings">💾 Simpan</button>
                        </div>
                    </div>
                    <div class="glass-sm" style="padding:20px;margin-bottom:14px;">
                        <h4>🔄 Reset Bulan Baru</h4><p style="font-size:0.75rem;color:var(--text-muted);">Reset semua pengeluaran & hutang ke default.</p>
                        <button class="btn btn-outline btn-sm" id="btnResetMonth">🔄 Reset Bulan</button>
                    </div>
                    <div class="glass-sm" style="padding:20px;margin-bottom:14px;">
                        <h4>💾 Data</h4>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-outline btn-sm" id="btnExportData">📤 Export JSON</button>
                            <button class="btn btn-outline btn-sm" id="btnImportData">📥 Import JSON</button>
                            <button class="btn btn-danger-sm" id="btnResetData">⚠️ Reset Semua</button>
                        </div>
                    </div>
                `;
            }
            async saveSettings() {
                const initialMoney = parseInt(document.getElementById('setInitialMoney').value) || 1000000;
                const monthStart = document.getElementById('setMonthStart').value;
                const monthEnd = document.getElementById('setMonthEnd').value;
                this.finance.initialMoney = initialMoney;
                this.finance.monthStart = monthStart;
                this.finance.monthEnd = monthEnd;
                this.finance.totalDays = this.finance.getDaysInMonth();
                await this.finance.storage.setData('initialMoney', initialMoney);
                await this.finance.storage.setData('monthStart', monthStart);
                await this.finance.storage.setData('monthEnd', monthEnd);
                await this.finance.recalculateBalance();
                this.ui.showToast('Pengaturan disimpan ✅', 'success');
                this.renderPage('settings');
            }
            async exportData() {
                const data = await this.storage.exportAll();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'surviveu_backup.json'; a.click();
                URL.revokeObjectURL(url);
                this.ui.showToast('Diexport 📤', 'success');
            }
            showImportModal() {
                const contentHtml = `<p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:10px;">Pilih file JSON.</p><input type="file" id="importFileInput" accept=".json">`;
                this.ui.showModal('Import Data', contentHtml, async (overlay) => {
                    const file = overlay.querySelector('#importFileInput').files[0];
                    if (!file) { this.ui.showToast('Pilih file', 'warning'); return false; }
                    try {
                        const text = await file.text();
                        const data = JSON.parse(text);
                        await this.storage.importAll(data);
                        await this.finance.init();
                        this.analytics = new AnalyticsManager(this.finance);
                        this.ui.showToast('Berhasil diimport 📥', 'success');
                        this.renderPage('settings');
                    } catch (e) { this.ui.showToast('File tidak valid', 'danger'); }
                }, 'Import');
            }
            async resetAllData() {
                if (confirm('⚠️ Reset SEMUA data?')) {
                    if (confirm('Terakhir: semua akan hilang.')) {
                        await this.storage.clearAll();
                        await this.finance.init();
                        this.analytics = new AnalyticsManager(this.finance);
                        this.ui.showToast('Semua direset 🔄', 'warning');
                        this.ui.navigateTo('dashboard');
                        this.renderPage('dashboard');
                    }
                }
            }
            async resetMonth() {
                if (confirm('Reset ke bulan baru? Pengeluaran akan dihapus.')) {
                    await this.finance.resetMonth(this.finance.initialMoney);
                    this.analytics = new AnalyticsManager(this.finance);
                    this.ui.showToast('Bulan baru! 🎉', 'success');
                    this.ui.navigateTo('dashboard');
                    this.renderPage('dashboard');
                }
            }
        }

        const app = new App();
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>

</html>
