<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SurviveU - Manajemen Keuangan Mahasiswa</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-glass: rgba(22, 22, 31, 0.75);
            --bg-glass-hover: rgba(28, 28, 40, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(255, 255, 255, 0.12);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.35);
            --accent-light: #a29bfe;
            --success: #00d2a0;
            --success-glow: rgba(0, 210, 160, 0.3);
            --warning: #f9a825;
            --warning-glow: rgba(249, 168, 37, 0.35);
            --danger: #ff5252;
            --danger-glow: rgba(255, 82, 82, 0.35);
            --info: #448aff;
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --sidebar-w: 260px;
            --bottom-nav-h: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 15px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        /* Glass */
        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            transition: var(--transition);
        }

        .glass:hover {
            border-color: var(--border-active);
            background: var(--bg-glass-hover);
        }

        .glass-sm {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: var(--transition);
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: transform var(--transition);
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-w);
            padding: 20px 24px 100px;
            max-width: 1100px;
            width: 100%;
        }

        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-nav-h);
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            z-index: 200;
            justify-content: space-around;
            align-items: center;
            padding: 0 8px;
        }

        /* Hamburger */
        #menuToggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 300;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1.5rem;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Sidebar */
        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .sidebar-nav {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-nav li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .sidebar-nav li a:hover,
        .sidebar-nav li a.active {
            background: rgba(108, 92, 231, 0.12);
            color: var(--text-primary);
        }

        .sidebar-nav li a.active {
            background: rgba(108, 92, 231, 0.2);
            font-weight: 600;
        }

        .sidebar-user {
            margin-top: auto;
            padding: 14px;
            border-radius: var(--radius);
            background: var(--bg-glass);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .sidebar-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .sidebar-user-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-user-info .name {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-info .role {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Bottom nav */
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 12px;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            min-width: 48px;
        }

        .bottom-nav a.active {
            color: var(--accent-light);
        }

        /* Cards */
        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .page-header .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            animation: pulse-badge 2.5s infinite;
        }

        .status-aman {
            background: rgba(0, 210, 160, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 210, 160, 0.3);
        }

        .status-waspada {
            background: rgba(249, 168, 37, 0.15);
            color: var(--warning);
            border: 1px solid rgba(249, 168, 37, 0.3);
        }

        .status-kritis {
            background: rgba(255, 130, 40, 0.18);
            color: #ff8230;
            border: 1px solid rgba(255, 130, 40, 0.35);
        }

        .status-bangkrut {
            background: rgba(255, 82, 82, 0.2);
            color: var(--danger);
            border: 1px solid rgba(255, 82, 82, 0.4);
            animation: pulse-danger 1s infinite;
        }

        @keyframes pulse-badge {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.75
            }
        }

        @keyframes pulse-danger {

            0%,
            100% {
                box-shadow: 0 0 0 0 var(--danger-glow)
            }

            50% {
                box-shadow: 0 0 18px 6px var(--danger-glow)
            }
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        @media (min-width: 480px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 14px;
            }
        }

        .stat-card {
            padding: 16px 18px;
            border-radius: var(--radius-lg);
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: default;
        }

        .stat-card:hover {
            border-color: var(--border-active);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-card .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .stat-card .card-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .stat-card .card-value {
            font-size: 1.35rem;
            font-weight: 700;
            margin-top: 2px;
            letter-spacing: -0.3px;
        }

        .stat-card .card-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .icon-purple {
            background: rgba(108, 92, 231, 0.2);
            color: var(--accent-light);
        }

        .icon-green {
            background: rgba(0, 210, 160, 0.2);
            color: var(--success);
        }

        .icon-orange {
            background: rgba(249, 168, 37, 0.2);
            color: var(--warning);
        }

        .icon-red {
            background: rgba(255, 82, 82, 0.2);
            color: var(--danger);
        }

        .icon-blue {
            background: rgba(68, 138, 255, 0.2);
            color: var(--info);
        }

        /* Progress */
        .progress-wrap {
            margin: 6px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .progress-bar {
            height: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s;
        }

        .fill-success {
            background: linear-gradient(90deg, #00d2a0, #00e6b0);
        }

        .fill-warning {
            background: linear-gradient(90deg, #f9a825, #ffb340);
        }

        .fill-danger {
            background: linear-gradient(90deg, #ff5252, #ff6e6e);
        }

        .fill-accent {
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            letter-spacing: 0.2px;
            text-decoration: none;
            font-family: var(--font);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            background: #7c6df0;
            box-shadow: 0 6px 24px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border-active);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent-light);
        }

        .btn-sm {
            padding: 6px 13px;
            font-size: 0.75rem;
            border-radius: 50px;
        }

        .btn-danger-sm {
            background: rgba(255, 82, 82, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 82, 82, 0.3);
            padding: 8px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-success-sm {
            background: rgba(0, 210, 160, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 210, 160, 0.3);
            padding: 8px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            background: rgba(255, 255, 255, 0.02);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Forms */
        input,
        select,
        textarea {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.85rem;
            transition: var(--transition);
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.08);
        }

        select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,...");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 36px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
            width: 92%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            padding: 12px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            animation: toastIn 0.35s, toastOut 0.35s 2.5s forwards;
            box-shadow: var(--shadow);
            max-width: 360px;
        }

        .toast-success {
            background: rgba(0, 210, 160, 0.2);
            color: var(--success);
        }

        .toast-warning {
            background: rgba(249, 168, 37, 0.2);
            color: var(--warning);
        }

        .toast-danger {
            background: rgba(255, 82, 82, 0.2);
            color: var(--danger);
        }

        .toast-info {
            background: rgba(68, 138, 255, 0.2);
            color: var(--info);
        }

        @keyframes toastIn {
            from {
                transform: translateX(120%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        @keyframes toastOut {
            from {
                transform: translateX(0);
                opacity: 1
            }

            to {
                transform: translateX(120%);
                opacity: 0
            }
        }

        /* Chart */
        .chart-container {
            position: relative;
            width: 100%;
        }

        .chart-container canvas {
            width: 100% !important;
            max-height: 300px;
        }

        /* Empty */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        /* Alert */
        .alert-banner {
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            font-weight: 600;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-danger {
            background: rgba(255, 82, 82, 0.12);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff6e6e;
        }

        .alert-warning {
            background: rgba(249, 168, 37, 0.12);
            border: 1px solid rgba(249, 168, 37, 0.3);
            color: #ffb340;
        }

        .alert-info {
            background: rgba(68, 138, 255, 0.1);
            border: 1px solid rgba(68, 138, 255, 0.25);
            color: #6aa0ff;
        }

        /* Auth */
        .auth-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 32px 28px;
            border-radius: var(--radius-xl);
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255, 255, 255, 0.03) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }

            .main-content {
                margin-left: 0;
                padding: 60px 12px 100px;
            }

            .bottom-nav {
                display: flex;
            }

            #menuToggle {
                display: flex;
            }

            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 8px;
            }

            .stat-card {
                padding: 12px 14px;
                border-radius: var(--radius);
            }

            .stat-card .card-value {
                font-size: 1.1rem;
            }

            .modal {
                width: 96%;
                padding: 18px;
                border-radius: var(--radius-lg);
            }

            .page-header h1 {
                font-size: 1.3rem;
            }
        }

        @media (min-width: 769px) {
            .bottom-nav {
                display: none;
            }

            .sidebar {
                transform: translateX(0);
            }

            #menuToggle {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen" style="display:none;">
        <div class="auth-card glass">
            <h2>🔐 SurviveU</h2>
            <p class="subtitle">Manajemen Keuangan Mahasiswa</p>
            <div id="authForm" style="display:flex;flex-direction:column;gap:12px;">
                <input type="text" id="authName" placeholder="Nama lengkap" style="display:none;">
                <input type="email" id="authEmail" placeholder="Email">
                <input type="password" id="authPassword" placeholder="Password">
                <button class="btn btn-primary" id="authSubmitBtn">Masuk</button>
                <button class="btn btn-outline" id="authToggleMode">Belum punya akun? Daftar</button>
                <button class="btn btn-outline" id="authGuestBtn">👀 Lanjut sebagai Guest</button>
            </div>
            <p id="authError"
                style="color:var(--danger);font-size:0.75rem;text-align:center;margin-top:8px;display:none;"></p>
        </div>
    </div>

    <!-- App Container -->
    <div id="appContainer" style="display:none;">

        <!-- Hamburger Button -->

        // ---------- STORAGE MANAGER ----------
        class StorageManager {
            constructor() {
                this.prefix = 'surviveu_';
                this.localCache = {};
            }
            async getData(key) {
                if (firebaseAvailable && auth && auth.currentUser && db) {
                    try {
                        const doc = await db.collection('users').doc(auth.currentUser.uid).collection('data').doc(key).get();
                        if (doc.exists) {
                            const data = doc.data().value;
                            this.localCache[key] = data;
                            localStorage.setItem(this.prefix + key, JSON.stringify(data));
                            return data;
                        }
                    } catch (e) { /* fallback */ }
                }
                const raw = localStorage.getItem(this.prefix + key);
                if (raw) { try { return JSON.parse(raw); } catch { return raw; } }
                return this.localCache[key] || null;
            }
            async setData(key, value) {
                this.localCache[key] = value;
                localStorage.setItem(this.prefix + key, JSON.stringify(value));
                if (firebaseAvailable && auth && auth.currentUser && db) {
                    try {
                        await db.collection('users').doc(auth.currentUser.uid).collection('data').doc(key).set({
                            value: value,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    } catch (e) { /* silent */ }
                }
            }
            async removeData(key) {
                delete this.localCache[key];
                localStorage.removeItem(this.prefix + key);
                if (firebaseAvailable && auth && auth.currentUser && db) {
                    try { await db.collection('users').doc(auth.currentUser.uid).collection('data').doc(key).delete(); } catch (e) { }
                }
            }
            async clearAll() {
                const keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k.startsWith(this.prefix)) keys.push(k.replace(this.prefix, ''));
                }
                for (const k of keys) { await this.removeData(k); }
                this.localCache = {};
            }
            async exportAll() {
                const data = {};
                const keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k.startsWith(this.prefix)) keys.push(k.replace(this.prefix, ''));
                }
                for (const k of keys) { data[k] = await this.getData(k); }
                return data;
            }
            async importAll(data) {
                for (const [k, v] of Object.entries(data)) { await this.setData(k, v); }
            }
        }

        // ---------- FINANCE MANAGER ----------
        class FinanceManager {
            constructor(storage) {
                this.storage = storage;
                this.initialMoney = 1000000;
                this.currentBalance = 1000000;
                this.expenses = [];
                this.debts = [];
                this.monthStart = '2026-05-01';
                this.monthEnd = '2026-05-31';
                this.totalDays = 31;
            }
            async init() {
                this.initialMoney = (await this.storage.getData('initialMoney')) || 1000000;
                this.currentBalance = (await this.storage.getData('currentBalance')) || this.initialMoney;
                this.expenses = (await this.storage.getData('expenses')) || [];
                this.debts = (await this.storage.getData('debts')) || this.getDefaultDebts();
                this.monthStart = (await this.storage.getData('monthStart')) || '2026-05-01';
                this.monthEnd = (await this.storage.getData('monthEnd')) || '2026-05-31';
                this.totalDays = this.getDaysInMonth();
                await this.recalculateBalance();
                return this;
            }
            getDefaultDebts() {
                return [
                    { id: 'd1', name: 'Hutang A (Prioritas)', amount: 157050, paid: 0, dueDate: '2026-05-15', priority: 'high', status: 'unpaid' },
                    { id: 'd2', name: 'Hutang B', amount: 91675, paid: 0, dueDate: '2026-05-20', priority: 'medium', status: 'unpaid' },
                    { id: 'd3', name: 'Hutang C', amount: 45000, paid: 0, dueDate: '2026-05-25', priority: 'low', status: 'unpaid' },
                    { id: 'd4', name: 'Hutang D (Cicilan)', amount: 180000, paid: 0, dueDate: '2026-05-28', priority: 'high', status: 'unpaid' },
                ];
            }
            getDaysInMonth() {
                const start = new Date(this.monthStart);
                const end = new Date(this.monthEnd);
                return Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
            }
            getToday() { return new Date().toISOString().split('T')[0]; }
            getDaysRemaining() {
                const today = new Date(this.getToday());
                const end = new Date(this.monthEnd);
                return Math.max(0, Math.floor((end - today) / (1000 * 60 * 60 * 24))) + 1;
            }
            getDaysElapsed() {
                const start = new Date(this.monthStart);
                const today = new Date(this.getToday());
                return Math.max(0, Math.min(Math.floor((today - start) / (1000 * 60 * 60 * 24)), this.totalDays));
            }
            getTotalDebtRemaining() { return this.debts.reduce((s, d) => s + (d.amount - (d.paid || 0)), 0); }
            getTotalDebtPaid() { return this.debts.reduce((s, d) => s + (d.paid || 0), 0); }
            getTotalExpenses() { return this.expenses.reduce((s, e) => s + e.amount, 0); }
            getMoneyAfterDebts() { return this.currentBalance - this.getTotalDebtRemaining(); }
            getSafeDailyBudget() {
                const remaining = this.getMoneyAfterDebts();
                const daysLeft = this.getDaysRemaining();
                return daysLeft > 0 ? Math.max(0, remaining / daysLeft) : 0;
            }
            getSafePerMeal() { return Math.floor(this.getSafeDailyBudget() / 3); }
            getSafeTransport() { return Math.floor(this.getSafeDailyBudget() * 0.25); }
            getEmergencyReserve() { return Math.floor(this.getMoneyAfterDebts() * 0.1); }
            getTodayExpenses() {
                const today = this.getToday();
                return this.expenses.filter(e => e.date === today).reduce((s, e) => s + e.amount, 0);
            }
            getSafeToSpendToday() { return Math.max(0, this.getSafeDailyBudget() - this.getTodayExpenses()); }
            getPredictedEmptyDate() {
                const safeDaily = this.getSafeDailyBudget();
                const remaining = this.getMoneyAfterDebts();
                if (safeDaily <= 0) return 'Sekarang';
                const daysLeft = Math.floor(remaining / safeDaily);
                const today = new Date(this.getToday());
                const emptyDate = new Date(today.getTime() + daysLeft * 24 * 60 * 60 * 1000);
                return emptyDate.toISOString().split('T')[0];
            }
            getSurvivalPercentage() {
                const totalNeeded = this.initialMoney;
                const available = this.getMoneyAfterDebts();
                const elapsed = this.getDaysElapsed();
                const total = this.totalDays;
                const expectedSpent = (totalNeeded / total) * elapsed;
                const expectedRemaining = totalNeeded - expectedSpent;
                if (expectedRemaining <= 0) return 100;
                return Math.min(100, Math.max(0, Math.round((available / expectedRemaining) * 100)));
            }
            getFinancialStatus() {
                const survival = this.getSurvivalPercentage();
                const moneyAfterDebts = this.getMoneyAfterDebts();
                if (moneyAfterDebts <= 0) return { status: 'bangkrut', label: 'BANGKRUT MODE', cssClass: 'status-bangkrut' };
                if (survival >= 80) return { status: 'aman', label: 'AMAN', cssClass: 'status-aman' };
                if (survival >= 50) return { status: 'waspada', label: 'WASPADA', cssClass: 'status-waspada' };
                return { status: 'kritis', label: 'KRITIS', cssClass: 'status-kritis' };
            }
            async recalculateBalance() {
                const totalExpenses = this.getTotalExpenses();
                const totalDebtPaid = this.getTotalDebtPaid();
                this.currentBalance = this.initialMoney - totalExpenses - totalDebtPaid;
                await this.storage.setData('currentBalance', this.currentBalance);
                return this.currentBalance;
            }
            async addExpense(expense) {
                expense.id = 'exp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                expense.createdAt = new Date().toISOString();
                this.expenses.unshift(expense);
                await this.storage.setData('expenses', this.expenses);
                await this.recalculateBalance();
                return expense;
            }
            async updateExpense(id, updates) {
                const idx = this.expenses.findIndex(e => e.id === id);
                if (idx >= 0) {
                    this.expenses[idx] = { ...this.expenses[idx], ...updates, updatedAt: new Date().toISOString() };
                    await this.storage.setData('expenses', this.expenses);
                    await this.recalculateBalance();
                }
            }
            async deleteExpense(id) {
                this.expenses = this.expenses.filter(e => e.id !== id);
                await this.storage.setData('expenses', this.expenses);
                await this.recalculateBalance();
            }
            async addDebt(debt) {
                debt.id = 'debt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                debt.paid = debt.paid || 0;
                debt.status = debt.status || 'unpaid';
                this.debts.push(debt);
                await this.storage.setData('debts', this.debts);
                await this.recalculateBalance();
            }
            async updateDebt(id, updates) {
                const idx = this.debts.findIndex(d => d.id === id);
                if (idx >= 0) {
                    this.debts[idx] = { ...this.debts[idx], ...updates };
                    if (this.debts[idx].paid >= this.debts[idx].amount) {
                        this.debts[idx].status = 'paid';
                        this.debts[idx].paid = this.debts[idx].amount;
                    }
                    await this.storage.setData('debts', this.debts);
                    await this.recalculateBalance();
                }
            }
            async deleteDebt(id) {
                this.debts = this.debts.filter(d => d.id !== id);
                await this.storage.setData('debts', this.debts);
                await this.recalculateBalance();
            }
            async markDebtPaid(id) {
                const idx = this.debts.findIndex(d => d.id === id);
                if (idx >= 0) {
                    this.debts[idx].paid = this.debts[idx].amount;
                    this.debts[idx].status = 'paid';
                    await this.storage.setData('debts', this.debts);
                    await this.recalculateBalance();
                }
            }
            async resetMonth(newInitial) {
                this.initialMoney = newInitial || 1000000;
                this.currentBalance = this.initialMoney;
                this.expenses = [];
                this.debts = this.getDefaultDebts();
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                this.monthStart = new Date(year, month, 1).toISOString().split('T')[0];
                const lastDay = new Date(year, month + 1, 0).getDate();
                this.monthEnd = new Date(year, month, lastDay).toISOString().split('T')[0];
                this.totalDays = lastDay;
                await this.storage.setData('initialMoney', this.initialMoney);
                await this.storage.setData('currentBalance', this.currentBalance);
                await this.storage.setData('expenses', this.expenses);
                await this.storage.setData('debts', this.debts);
                await this.storage.setData('monthStart', this.monthStart);
                await this.storage.setData('monthEnd', this.monthEnd);
            }
            getDailyExpenseSummary() {
                const summary = {};
                this.expenses.forEach(e => { summary[e.date] = (summary[e.date] || 0) + e.amount; });
                return summary;
            }
            getCategorySummary() {
                const summary = {};
                this.expenses.forEach(e => { const cat = e.category || 'Lainnya'; summary[cat] = (summary[cat] || 0) + e.amount; });
                return summary;
            }
            getWeeklySummary() {
                const weeks = {};
                this.expenses.forEach(e => {
                    const d = new Date(e.date);
                    const weekNum = Math.ceil((d.getDate() + new Date(d.getFullYear(), d.getMonth(), 1).getDay()) / 7);
                    const key = 'Minggu ke-' + weekNum;
                    weeks[key] = (weeks[key] || 0) + e.amount;
                });
                return weeks;
            }
            getSmartAlerts() {
                const alerts = [];
                const status = this.getFinancialStatus();
                const todayExp = this.getTodayExpenses();
                const safeDaily = this.getSafeDailyBudget();
                const moneyAfterDebts = this.getMoneyAfterDebts();
                const daysRemaining = this.getDaysRemaining();

                if (status.status === 'bangkrut') alerts.push({ type: 'danger', msg: '⚠️ MODE BANGKRUT! Uang tidak cukup untuk menutupi hutang.' });
                else if (status.status === 'kritis') alerts.push({ type: 'danger', msg: '🔴 Mode Kritis! Uang mungkin tidak cukup sampai akhir bulan.' });
                else if (status.status === 'waspada') alerts.push({ type: 'warning', msg: '🟡 Mode Waspada. Pengeluaran mulai berbahaya.' });

                if (todayExp > safeDaily * 1.5) alerts.push({ type: 'danger', msg: `💸 Hari ini terlalu boros!` });
                else if (todayExp > safeDaily) alerts.push({ type: 'warning', msg: '⚡ Pengeluaran hari ini di atas batas aman.' });

                const highUnpaid = this.debts.filter(d => d.priority === 'high' && d.status === 'unpaid');
                if (highUnpaid.length > 0) alerts.push({ type: 'warning', msg: `📌 ${highUnpaid.length} hutang prioritas tinggi belum dibayar.` });

                const predEmptyDate = new Date(this.getPredictedEmptyDate());
                const monthEndDate = new Date(this.monthEnd);
                if (predEmptyDate < monthEndDate && status.status !== 'bangkrut') {
                    alerts.push({ type: 'warning', msg: `📉 Prediksi uang habis sebelum akhir bulan.` });
                }

                if (alerts.length === 0 && status.status === 'aman') alerts.push({ type: 'info', msg: '✅ Keuangan masih aman. Tetap hemat!' });
                return alerts;
            }
        }

        // ---------- AUTH MANAGER ----------
        class AuthManager {
            constructor(storage) { this.storage = storage; this.user = null; this.isGuest = false; }
            async init() {
                const savedUser = await this.storage.getData('authUser');
                if (savedUser) { this.user = savedUser; this.isGuest = savedUser.isGuest || false; }
                if (firebaseAvailable && auth) {
                    return new Promise((resolve) => {
                        const unsubscribe = auth.onAuthStateChanged(async (fbUser) => {
                            unsubscribe();
                            if (fbUser) {
                                this.user = { uid: fbUser.uid, email: fbUser.email, displayName: fbUser.displayName || fbUser.email, isGuest: false };
                                this.isGuest = false;
                                await this.storage.setData('authUser', this.user);
                            }
                            resolve(this.user);
                        });
                        setTimeout(() => resolve(this.user), 3000);
                    });
                }
                return this.user;
            }
            async register(email, password, name) {
                if (firebaseAvailable && auth) {
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    await cred.user.updateProfile({ displayName: name });
                    this.user = { uid: cred.user.uid, email, displayName: name, isGuest: false };
                } else {
                    this.user = { uid: 'local_' + Date.now(), email, displayName: name, isGuest: false };
                }
                this.isGuest = false;
                await this.storage.setData('authUser', this.user);
                return this.user;
            }
            async login(email, password) {
                if (firebaseAvailable && auth) {
                    const cred = await auth.signInWithEmailAndPassword(email, password);
                    this.user = { uid: cred.user.uid, email: cred.user.email, displayName: cred.user.displayName || cred.user.email, isGuest: false };
                } else {
                    const saved = await this.storage.getData('authUser');
                    this.user = (saved && saved.email === email) ? saved : { uid: 'local_' + Date.now(), email, displayName: email, isGuest: false };
                }
                this.isGuest = false;
                await this.storage.setData('authUser', this.user);
                return this.user;
            }
            async loginAsGuest() {
                this.user = { uid: 'guest_' + Date.now(), email: 'guest@surviveu.app', displayName: 'Guest', isGuest: true };
                this.isGuest = true;
                await this.storage.setData('authUser', this.user);
                if (firebaseAvailable && auth) { try { await auth.signInAnonymously(); } catch (e) { } }
                return this.user;
            }
            async logout() {
                this.user = null; this.isGuest = false;
                await this.storage.removeData('authUser');
                if (firebaseAvailable && auth) { try { await auth.signOut(); } catch (e) { } }
            }
            isLoggedIn() { return !!this.user; }
        }

        // ---------- UI MANAGER ----------
        class UIManager {
            constructor() { this.currentPage = 'dashboard'; }
            showToast(msg, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = msg;
                container.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
            }
            showModal(title, contentHtml, onConfirm, confirmText = 'Simpan') {
                const container = document.getElementById('modalContainer');
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal glass">
                        <h3>${title}</h3>
                        <div>${contentHtml}</div>
                        <div class="modal-actions" style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;">
                            <button class="btn btn-outline btn-sm cancel-btn">Batal</button>
                            <button class="btn btn-primary btn-sm confirm-btn">${confirmText}</button>
                        </div>
                    </div>
                `;
                container.appendChild(overlay);
                const close = () => overlay.remove();
                overlay.querySelector('.cancel-btn').addEventListener('click', close);
                overlay.querySelector('.confirm-btn').addEventListener('click', () => {
                    if (onConfirm) { const result = onConfirm(overlay); if (result !== false) close(); }
                    else close();
                });
                overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
                return overlay;
            }
            navigateTo(page) {
                this.currentPage = page;
                document.querySelectorAll('.sidebar-nav a, .bottom-nav a').forEach(a => a.classList.remove('active'));
                document.querySelectorAll(`[data-page="${page}"]`).forEach(a => a.classList.add('active'));
                document.getElementById('sidebar').classList.remove('open');
                document.dispatchEvent(new CustomEvent('pageChange', { detail: { page } }));
            }
            updateSidebarUser(user) {
                const name = user ? (user.displayName || 'Mahasiswa') : 'Mahasiswa';
                const role = user ? (user.isGuest ? 'Guest' : 'User') : 'Guest';
                document.getElementById('sidebarName').textContent = name;
                document.getElementById('sidebarRole').textContent = role;
                document.getElementById('sidebarAvatar').textContent = name.charAt(0).toUpperCase();
            }
            formatRupiah(num) { return 'Rp' + Math.round(num).toLocaleString('id-ID'); }
            formatDate(dateStr) {
                if (!dateStr) return '-';
                const d = new Date(dateStr);
                return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            }
            getStatusBadge(statusObj) {
                return `<span class="status-badge ${statusObj.cssClass}">${statusObj.label}</span>`;
            }
        }

        // ---------- ANALYTICS MANAGER ----------
        class AnalyticsManager {
            constructor(financeManager) { this.fm = financeManager; this.charts = {}; }
            destroyCharts() { Object.values(this.charts).forEach(c => { if (c && c.destroy) c.destroy(); }); this.charts = {}; }
            renderDailyChart(canvasId) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                if (this.charts[canvasId]) this.charts[canvasId].destroy();
                const dailySummary = this.fm.getDailyExpenseSummary();
                const sorted = Object.entries(dailySummary).sort((a, b) => a[0].localeCompare(b[0]));
                const labels = sorted.map(s => { const d = new Date(s[0]); return d.getDate() + '/' + (d.getMonth() + 1); });
                const data = sorted.map(s => s[1]);
                this.charts[canvasId] = new Chart(canvas, {
                    type: 'bar',
                    data: { labels: labels.length ? labels : ['Belum ada'], datasets: [{ label: 'Pengeluaran Harian', data: data.length ? data : [0], backgroundColor: 'rgba(108,92,231,0.5)', borderColor: 'rgba(108,92,231,1)', borderWidth: 1, borderRadius: 6 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#a0a0b8', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.03)' } }, y: { ticks: { color: '#a0a0b8', font: { size: 10 }, callback: v => 'Rp' + v.toLocaleString('id-ID') }, grid: { color: 'rgba(255,255,255,0.04)' } } } }
                });
            }
            renderCategoryChart(canvasId) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                if (this.charts[canvasId]) this.charts[canvasId].destroy();
                const catSummary = this.fm.getCategorySummary();
                const entries = Object.entries(catSummary).sort((a, b) => b[1] - a[1]);
                const colors = ['#6c5ce7', '#ff5252', '#f9a825', '#00d2a0', '#448aff', '#ff8230', '#a29bfe', '#ff6e6e'];
                this.charts[canvasId] = new Chart(canvas, {
                    type: 'doughnut',
                    data: { labels: entries.length ? entries.map(e => e[0]) : ['Belum ada data'], datasets: [{ data: entries.length ? entries.map(e => e[1]) : [1], backgroundColor: colors.slice(0, Math.max(entries.length, 1)), borderColor: 'rgba(0,0,0,0.3)', borderWidth: 2 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#a0a0b8', font: { size: 10 }, padding: 14 } } } }
                });
            }
            getFinancialHealthScore() {
                const survival = this.fm.getSurvivalPercentage();
                const debtRatio = this.fm.initialMoney > 0 ? (this.fm.getTotalDebtRemaining() / this.fm.initialMoney) * 100 : 0;
                return Math.max(0, Math.min(100, Math.round(survival * 0.7 + (100 - debtRatio) * 0.3)));
            }
            getMostDangerousCategory() {
                const catSummary = this.fm.getCategorySummary();
                let maxCat = null, maxVal = 0;
                for (const [cat, val] of Object.entries(catSummary)) { if (val > maxVal) { maxVal = val; maxCat = cat; } }
                return { category: maxCat, amount: maxVal };
            }
        }

        // ---------- MAIN APP ----------
        class App {
            constructor() {
                this.storage = new StorageManager();
                this.auth = new AuthManager(this.storage);
                this.finance = new FinanceManager(this.storage);
                this.ui = new UIManager();
                this.analytics = null;
                this.isInitialized = false;
            }
            async init() {
                const user = await this.auth.init();
                await this.finance.init();
                this.analytics = new AnalyticsManager(this.finance);
                if (this.auth.isLoggedIn()) {
                    this.showApp();
                } else {
                    this.showAuth();
                }
                this.setupEventListeners();
                this.isInitialized = true;
                console.log('✅ SurviveU initialized');
            }
            showAuth() {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
                document.getElementById('authName').style.display = 'none';
                document.getElementById('authSubmitBtn').textContent = 'Masuk';
                document.getElementById('authToggleMode').textContent = 'Belum punya akun? Daftar';
                document.getElementById('authError').style.display = 'none';
                this.authMode = 'login';
            }
            showApp() {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                this.ui.updateSidebarUser(this.auth.user);
                this.ui.navigateTo('dashboard');
                this.renderPage('dashboard');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
            setupEventListeners() {
                document.getElementById('authSubmitBtn').addEventListener('click', () => this.handleAuthSubmit());
                document.getElementById('authToggleMode').addEventListener('click', () => this.toggleAuthMode());
                document.getElementById('authGuestBtn').addEventListener('click', () => this.handleGuestLogin());
                document.getElementById('logoutBtn').addEventListener('click', () => this.handleLogout());

                document.querySelectorAll('.sidebar-nav a, .bottom-nav a').forEach(a => {
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = a.getAttribute('data-page');
                        this.ui.navigateTo(page);
                        this.renderPage(page);
                    });
                });

                document.addEventListener('pageChange', (e) => { this.renderPage(e.detail.page); });

                document.getElementById('sidebarUser').addEventListener('click', (e) => {
                    if (e.target.closest('#logoutBtn')) return;
                    this.ui.navigateTo('settings');
                    this.renderPage('settings');
                });

                // Hamburger menu
                document.getElementById('menuToggle')?.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('open');
                });

                // Swipe to open sidebar
                let touchStartX = 0;
                document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
                document.addEventListener('touchend', (e) => {
                    const diff = e.changedTouches[0].clientX - touchStartX;
                    if (diff > 70 && touchStartX < 30 && window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.add('open');
                    }
                    if (diff < -70 && window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('open');
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('modalContainer').innerHTML = '';
                    }
                });
            }
            async handleAuthSubmit() {
                const email = document.getElementById('authEmail').value.trim();
                const password = document.getElementById('authPassword').value.trim();
                const name = document.getElementById('authName').value.trim();
                const errorEl = document.getElementById('authError');
                if (!email || !password) { errorEl.textContent = 'Email dan password wajib diisi.'; errorEl.style.display = 'block'; return; }
                try {
                    if (this.authMode === 'register') {
                        if (!name) { errorEl.textContent = 'Nama lengkap wajib diisi.'; errorEl.style.display = 'block'; return; }
                        await this.auth.register(email, password, name);
                    } else {
                        await this.auth.login(email, password);
                    }
                    errorEl.style.display = 'none';
                    await this.finance.init();
                    this.analytics = new AnalyticsManager(this.finance);
                    this.showApp();
                    this.ui.showToast('Selamat datang! 👋', 'success');
                } catch (e) {
                    errorEl.textContent = 'Gagal: ' + (e.message || 'Periksa kredensial.');
                    errorEl.style.display = 'block';
                }
            }
            toggleAuthMode() {
                const nameInput = document.getElementById('authName');
                const submitBtn = document.getElementById('authSubmitBtn');
                const toggleBtn = document.getElementById('authToggleMode');
                const errorEl = document.getElementById('authError');
                errorEl.style.display = 'none';
                if (this.authMode === 'login') {
                    this.authMode = 'register';
                    nameInput.style.display = 'block';
                    submitBtn.textContent = 'Daftar';
                    toggleBtn.textContent = 'Sudah punya akun? Masuk';
                } else {
                    this.authMode = 'login';
                    nameInput.style.display = 'none';
                    submitBtn.textContent = 'Masuk';
                    toggleBtn.textContent = 'Belum punya akun? Daftar';
                }
            }
            async handleGuestLogin() {
                await this.auth.loginAsGuest();
                await this.finance.init();
                this.analytics = new AnalyticsManager(this.finance);
                this.showApp();
                this.ui.showToast('Masuk sebagai Guest 👀', 'info');
            }
            async handleLogout() {
                await this.auth.logout();
                this.ui.showToast('Berhasil logout 👋', 'info');
                this.showAuth();
            }
            renderPage(page) {
                const main = document.getElementById('mainContent');
                this.analytics.destroyCharts();
                switch (page) {
                    case 'dashboard': main.innerHTML = this.renderDashboard(); break;
                    case 'expenses': main.innerHTML = this.renderExpenses(); break;
                    case 'debts': main.innerHTML = this.renderDebts(); break;
                    case 'analytics': main.innerHTML = this.renderAnalytics(); break;
                    case 'settings': main.innerHTML = this.renderSettings(); break;
                    default: main.innerHTML = this.renderDashboard();
                }
                if (typeof lucide !== 'undefined') lucide.createIcons();
                this.bindPageEvents(page);
                setTimeout(() => {
                    if (page === 'analytics') {
                        this.analytics.renderDailyChart('dailyChart');
                        this.analytics.renderCategoryChart('categoryChart');
                    }
                    if (page === 'dashboard') {
                        this.analytics.renderDailyChart('dashboardDailyChart');
                    }
                }, 200);
            }
            bindPageEvents(page) {
                if (page === 'expenses') {
                    document.getElementById('btnAddExpense')?.addEventListener('click', () => this.showExpenseModal());
                    document.querySelectorAll('.expense-edit-btn').forEach(b => b.addEventListener('click', () => this.showExpenseModal(b.dataset.id)));
                    document.querySelectorAll('.expense-delete-btn').forEach(b => b.addEventListener('click', () => this.deleteExpense(b.dataset.id)));
                }
                if (page === 'debts') {
                    document.getElementById('btnAddDebt')?.addEventListener('click', () => this.showDebtModal());
                    document.querySelectorAll('.debt-pay-btn').forEach(b => b.addEventListener('click', () => this.markDebtPaid(b.dataset.id)));
                    document.querySelectorAll('.debt-delete-btn').forEach(b => b.addEventListener('click', () => this.deleteDebt(b.dataset.id)));
                }
                if (page === 'settings') {
                    document.getElementById('btnSaveSettings')?.addEventListener('click', () => this.saveSettings());
                    document.getElementById('btnExportData')?.addEventListener('click', () => this.exportData());
                    document.getElementById('btnImportData')?.addEventListener('click', () => this.showImportModal());
                    document.getElementById('btnResetData')?.addEventListener('click', () => this.resetAllData());
                    document.getElementById('btnResetMonth')?.addEventListener('click', () => this.resetMonth());
                }
            }
            renderDashboard() {
                const fm = this.finance;
                const status = fm.getFinancialStatus();
                const alerts = fm.getSmartAlerts();
                const survivalPct = fm.getSurvivalPercentage();
                const healthScore = this.analytics.getFinancialHealthScore();
                let alertsHtml = '';
                alerts.forEach(a => {
                    alertsHtml += `<div class="alert-banner alert-${a.type}"><i data-lucide="alert-triangle" style="width:18px;height:18px;"></i> ${a.msg}</div>`;
                });
                const survivalColor = survivalPct >= 80 ? 'fill-success' : survivalPct >= 50 ? 'fill-warning' : 'fill-danger';
                const healthColor = healthScore >= 70 ? 'fill-success' : healthScore >= 40 ? 'fill-warning' : 'fill-danger';
                return `
                    <div class="page-header"><h1>📊 Dashboard Finansial</h1><p class="subtitle">${fm.getToday()} • ${fm.getDaysRemaining()} hari tersisa</p></div>
                    ${alertsHtml}
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">${this.ui.getStatusBadge(status)}<span style="font-size:0.8rem;color:var(--text-muted);">Financial Health: <b>${healthScore}/100</b></span></div>
                    <div class="cards-grid">
                        <div class="stat-card"><div class="card-icon icon-purple"><i data-lucide="wallet"></i></div><div class="card-label">Saldo Saat Ini</div><div class="card-value">${this.ui.formatRupiah(fm.currentBalance)}</div></div>
                        <div class="stat-card"><div class="card-icon icon-blue"><i data-lucide="banknote"></i></div><div class="card-label">Uang Awal Bulan</div><div class="card-value">${this.ui.formatRupiah(fm.initialMoney)}</div></div>
                        <div class="stat-card"><div class="card-icon icon-red"><i data-lucide="credit-card"></i></div><div class="card-label">Total Hutang Tersisa</div><div class="card-value">${this.ui.formatRupiah(fm.getTotalDebtRemaining())}</div><div class="card-sub">Terbayar: ${this.ui.formatRupiah(fm.getTotalDebtPaid())}</div></div>
                        <div class="stat-card"><div class="card-icon icon-green"><i data-lucide="piggy-bank"></i></div><div class="card-label">Uang Setelah Hutang</div><div class="card-value">${this.ui.formatRupiah(fm.getMoneyAfterDebts())}</div></div>
                        <div class="stat-card"><div class="card-icon icon-orange"><i data-lucide="clock"></i></div><div class="card-label">Budget Aman/Hari</div><div class="card-value">${this.ui.formatRupiah(fm.getSafeDailyBudget())}</div><div class="card-sub">Safe-to-spend: ${this.ui.formatRupiah(fm.getSafeToSpendToday())}</div></div>
                        <div class="stat-card"><div class="card-icon icon-blue"><i data-lucide="calendar-x"></i></div><div class="card-label">Prediksi Uang Habis</div><div class="card-value" style="font-size:1rem;">${fm.getPredictedEmptyDate()}</div></div>
                    </div>
                    <div class="cards-grid" style="grid-template-columns:1fr 1fr;">
                        <div class="stat-card"><div class="card-label">Survival Bulan Ini</div><div class="progress-wrap"><div class="progress-label"><span>${survivalPct}%</span><span>Target 100%</span></div><div class="progress-bar"><div class="progress-fill ${survivalColor}" style="width:${survivalPct}%;"></div></div></div></div>
                        <div class="stat-card"><div class="card-label">Financial Health Score</div><div class="progress-wrap"><div class="progress-label"><span>${healthScore}/100</span></div><div class="progress-bar"><div class="progress-fill ${healthColor}" style="width:${healthScore}%;"></div></div></div></div>
                    </div>
                    <div class="glass-sm" style="padding:16px;margin-top:6px;"><h4 style="font-size:0.85rem;margin-bottom:8px;color:var(--text-secondary);">📈 Pengeluaran Harian (Quick View)</h4><div class="chart-container" style="height:220px;"><canvas id="dashboardDailyChart"></canvas></div></div>
                    <div class="glass-sm" style="padding:14px 18px;margin-top:12px;display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;">
                        <div><span style="color:var(--text-muted);font-size:0.7rem;">🍽 Budget/Makan</span><br><b>${this.ui.formatRupiah(fm.getSafePerMeal())}</b></div>
                        <div><span style="color:var(--text-muted);font-size:0.7rem;">🚌 Transport</span><br><b>${this.ui.formatRupiah(fm.getSafeTransport())}</b></div>
                        <div><span style="color:var(--text-muted);font-size:0.7rem;">🆘 Dana Darurat</span><br><b>${this.ui.formatRupiah(fm.getEmergencyReserve())}</b></div>
                        <div><span style="color:var(--text-muted);font-size:0.7rem;">💰 Hari Ini Terpakai</span><br><b>${this.ui.formatRupiah(fm.getTodayExpenses())}</b></div>
                    </div>
                `;
            }
            renderExpenses() {
                const fm = this.finance;
                const expenses = fm.expenses;
                let rows = '';
                if (expenses.length === 0) rows = '<tr><td colspan="6"><div class="empty-state"><i data-lucide="inbox"></i><p>Belum ada pengeluaran</p></div></td></tr>';
                else {
                    expenses.forEach(e => {
                        rows += `<tr><td>${this.ui.formatDate(e.date)}</td><td><b>${e.category || 'Lainnya'}</b></td><td>${this.ui.formatRupiah(e.amount)}</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;">${e.note || '-'}</td><td>${e.method || '-'}</td><td><button class="btn-danger-sm expense-edit-btn" data-id="${e.id}">✏️</button> <button class="btn-danger-sm expense-delete-btn" data-id="${e.id}">🗑</button></td></tr>`;
                    });
                }
                return `<div class="page-header"><h1>🧾 Catatan Pengeluaran</h1><p class="subtitle">Total: ${this.ui.formatRupiah(fm.getTotalExpenses())}</p><button class="btn btn-primary btn-sm" id="btnAddExpense" style="margin-top:8px;">+ Tambah</button></div><div class="table-wrap glass-sm"><table><thead><tr><th>Tanggal</th><th>Kategori</th><th>Nominal</th><th>Catatan</th><th>Metode</th><th>Aksi</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            }
            showExpenseModal(editId = null) {
                const fm = this.finance;
                let existing = null;
                if (editId) existing = fm.expenses.find(e => e.id === editId);
                const contentHtml = `
                    <div style="display:flex;flex-direction:column;gap:10px;">
                        <div><label style="font-size:0.75rem;color:var(--text-muted);">Tanggal</label><input type="date" id="expDate" value="${existing ? existing.date : fm.getToday()}"></div>
                        <div><label>Kategori</label><select id="expCategory">${['Makan', 'Transport', 'Kuliah', 'Nongkrong', 'Tagihan', 'Darurat', 'Lainnya'].map(c => `<option value="${c}" ${existing && existing.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
                        <div><label>Nominal (Rp)</label><input type="number" id="expAmount" value="${existing ? existing.amount : ''}" placeholder="0" min="1"></div>
                        <div><label>Metode Bayar</label><select id="expMethod">${['Cash', 'QRIS', 'Transfer', 'GoPay', 'OVO', 'ShopeePay', 'Lainnya'].map(m => `<option value="${m}" ${existing && existing.method === m ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
                        <div><label>Catatan</label><input type="text" id="expNote" value="${existing ? existing.note || '' : ''}" placeholder="Opsional"></div>
                    </div>
                `;
                this.ui.showModal(existing ? 'Edit Pengeluaran' : 'Tambah Pengeluaran', contentHtml, (overlay) => {
                    const date = overlay.querySelector('#expDate').value;
                    const category = overlay.querySelector('#expCategory').value;
                    const amount = parseInt(overlay.querySelector('#expAmount').value) || 0;
                    const method = overlay.querySelector('#expMethod').value;
                    const note = overlay.querySelector('#expNote').value;
                    if (!date || amount <= 0) { this.ui.showToast('Tanggal dan nominal wajib diisi!', 'danger'); return false; }
                    if (existing) { fm.updateExpense(existing.id, { date, category, amount, method, note }); this.ui.showToast('Diperbarui ✅', 'success'); }
                    else { fm.addExpense({ date, category, amount, method, note }); this.ui.showToast('Ditambahkan 💸', 'info'); }
                    this.renderPage('expenses');
                }, existing ? 'Update' : 'Simpan');
            }
            async deleteExpense(id) {
                if (confirm('Hapus pengeluaran ini?')) {
                    await this.finance.deleteExpense(id);
                    this.ui.showToast('Dihapus 🗑', 'info');
                    this.renderPage('expenses');
                }
            }
            renderDebts() {
                const fm = this.finance;
                const debts = fm.debts;
                let rows = '';
                if (debts.length === 0) rows = '<tr><td colspan="7"><div class="empty-state"><i data-lucide="credit-card"></i><p>Belum ada hutang</p></div></td></tr>';
                else {
                    const priorityOrder = { high: 0, medium: 1, low: 2 };
                    const sorted = [...debts].sort((a, b) => (priorityOrder[a.priority] || 3) - (priorityOrder[b.priority] || 3));
                    sorted.forEach(d => {
                        const remaining = d.amount - (d.paid || 0);
                        const isPaid = d.status === 'paid';
                        rows += `<tr class="${isPaid ? 'text-muted' : ''}"><td><b>${d.name}</b></td><td>${this.ui.formatRupiah(d.amount)}</td><td>${this.ui.formatRupiah(d.paid || 0)}</td><td style="color:${isPaid ? 'var(--success)' : 'var(--danger)'}"><b>${this.ui.formatRupiah(remaining)}</b></td><td>${this.ui.formatDate(d.dueDate)}</td><td>${d.priority === 'high' ? '🔴 Tinggi' : d.priority === 'medium' ? '🟡 Sedang' : '🔵 Rendah'}</td><td>${isPaid ? '<span class="text-success">✅ Lunas</span>' : `<button class="btn-success-sm debt-pay-btn" data-id="${d.id}">✅ Lunas</button> <button class="btn-danger-sm debt-delete-btn" data-id="${d.id}">🗑</button>`}</td></tr>`;
                    });
                }
                return `<div class="page-header"><h1>💳 Manajemen Hutang</h1><p class="subtitle">Total tersisa: ${this.ui.formatRupiah(fm.getTotalDebtRemaining())}</p><button class="btn btn-primary btn-sm" id="btnAddDebt">+ Tambah Hutang</button></div><div class="table-wrap glass-sm"><table><thead><tr><th>Nama</th><th>Total</th><th>Terbayar</th><th>Sisa</th><th>Jatuh Tempo</th><th>Prioritas</th><th>Aksi</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            }
            showDebtModal() {
                const contentHtml = `
                    <div style="display:flex;flex-direction:column;gap:10px;">
                        <div><label>Nama Hutang</label><input type="text" id="debtName" placeholder="Contoh: Cicilan Laptop"></div>
                        <div><label>Total (Rp)</label><input type="number" id="debtAmount" placeholder="0" min="1"></div>
                        <div><label>Sudah Dibayar (Rp)</label><input type="number" id="debtPaid" value="0" min="0"></div>
                        <div><label>Jatuh Tempo</label><input type="date" id="debtDueDate"></div>
                        <div><label>Prioritas</label><select id="debtPriority"><option value="high">🔴 Tinggi</option><option value="medium">🟡 Sedang</option><option value="low">🔵 Rendah</option></select></div>
                    </div>
                `;
                this.ui.showModal('Tambah Hutang', contentHtml, async (overlay) => {
                    const name = overlay.querySelector('#debtName').value.trim();
                    const amount = parseInt(overlay.querySelector('#debtAmount').value) || 0;
                    const paid = parseInt(overlay.querySelector('#debtPaid').value) || 0;
                    const dueDate = overlay.querySelector('#debtDueDate').value;
                    const priority = overlay.querySelector('#debtPriority').value;
                    if (!name || amount <= 0) { this.ui.showToast('Nama dan total wajib diisi!', 'danger'); return false; }
                    await this.finance.addDebt({ name, amount, paid, dueDate, priority, status: paid >= amount ? 'paid' : 'unpaid' });
                    this.ui.showToast('Hutang ditambahkan 📋', 'info');
                    this.renderPage('debts');
                });
            }
            async markDebtPaid(id) { if (confirm('Tandai lunas?')) { await this.finance.markDebtPaid(id); this.ui.showToast('Lunas! 🎉', 'success'); this.renderPage('debts'); } }
            async deleteDebt(id) { if (confirm('Hapus hutang?')) { await this.finance.deleteDebt(id); this.ui.showToast('Dihapus', 'info'); this.renderPage('debts'); } }
            renderAnalytics() {
                const fm = this.finance;

                const dangerous = this.analytics.getMostDangerousCategory();
                const weeklySummary = fm.getWeeklySummary();

                let weeklyHtml = '';
